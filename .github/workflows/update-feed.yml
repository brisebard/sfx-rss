name: Update Sfx RSS feed

on:
  schedule:
    # Minimum pratique chez GitHub Actions : toutes les 5 minutes.
    # Le déclenchement réel peut être retardé de quelques minutes,
    # surtout aux heures de pointe (comportement documenté par GitHub).
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate feed
        env:
          FEED_SELF_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/feed.xml
        run: python generate_feed.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json docs/feed.xml
          git diff --staged --quiet || git commit -m "Mise a jour automatique du flux RSS"
          git push
